name: "08 - Создание релиза"

on:
  workflow_run:
    workflows: ["07 - Деплой в PROD"]
    types:
      - completed
    branches:
      - main
      - master
      - dev

permissions:
  contents: write
  pull-requests: read

jobs:
  check-previous-status:
    name: "🔍 Проверка статуса"
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "═══════════════════════════════════════════"
          echo "🔍 ПРОВЕРКА ПРЕДЫДУЩЕГО WORKFLOW"
          echo "═══════════════════════════════════════════"
          echo "📊 Статус: ${{ github.event.workflow_run.conclusion }}"
          
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "❌ Предыдущий шаг не успешен"
            exit 1
          fi
          echo "✅ Предыдущий шаг успешен"

  create-release:
    name: "🎉 Создание релиза"
    needs: check-previous-status
    runs-on: ubuntu-latest
    steps:
      - name: "📋 Начало создания релиза"
        run: |
          echo "═══════════════════════════════════════════"
          echo "🎉 ШАГ 8: СОЗДАНИЕ РЕЛИЗА"
          echo "═══════════════════════════════════════════"
          
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: "📦 Получение версии"
        id: version
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "0.1.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Версия релиза: v$VERSION"
          
      - name: "📝 Получение изменений"
        id: changes
        run: |
          # Получаем последние 10 коммитов
          CHANGES=$(git log -10 --pretty=format:"- %s" --abbrev-commit)
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
      - name: "📄 Подготовка описания"
        run: |
          cat > release_notes.md << EOF
          ## 🎉 Release v${{ steps.version.outputs.version }}
          
          ### 📦 Информация
          - **Дата:** $(date +"%d.%m.%Y %H:%M")
          - **Ветка:** main
          - **Коммит:** ${{ github.sha }}
          
          ### 📝 Изменения
          ${{ steps.changes.outputs.changes }}
          
          ### 🐳 Docker
          \`\`\`bash
          docker pull ${{ github.repository_owner }}/$(basename ${{ github.repository }}):v${{ steps.version.outputs.version }}
          \`\`\`
          EOF
          
          echo "✅ Описание готово"
          
      - name: "🔍 Проверка существующего релиза"
        id: check_release
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          
          # Проверяем, существует ли уже релиз с таким тегом
          if gh release view "$TAG" --json tagName > /dev/null 2>&1; then
            echo "❌ Релиз $TAG уже существует!"
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          else
            echo "✅ Релиз $TAG не существует, можно создавать"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: "🎉 Создание релиза"
        if: steps.check_release.outputs.exists == 'false'
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Release v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          
      - name: "⚠️ Релиз уже существует"
        if: steps.check_release.outputs.exists == 'true'
        run: |
          echo "═══════════════════════════════════════════"
          echo "⚠️ РЕЛИЗ УЖЕ СУЩЕСТВУЕТ"
          echo "═══════════════════════════════════════════"
          echo "📦 Тег: ${{ steps.check_release.outputs.tag }}"
          echo ""
          echo "Релиз с таким тегом уже создан ранее."
          echo "Если нужно обновить релиз, используйте команду:"
          echo "gh release edit ${{ steps.check_release.outputs.tag }} --notes-file release_notes.md"
          
      - name: "✅ Завершение"
        if: always()
        run: |
          echo "═══════════════════════════════════════════"
          echo "🎉 ШАГ 8 ЗАВЕРШЕН"
          echo "═══════════════════════════════════════════"
          if [ "${{ steps.check_release.outputs.exists }}" == "false" ]; then
            echo "📦 Релиз: v${{ steps.version.outputs.version }}"
            echo "🔗 Ссылка: ${{ steps.create_release.outputs.url }}"
          else
            echo "📦 Релиз v${{ steps.version.outputs.version }} уже существовал"
          fi
          echo ""
          echo "✨ Все 8 шагов выполнены успешно! ✨"
